# AI Meeting Assistant - 专有名词配置
#
# 此文件用于配置专有名词的大小写和全称规范。
# 系统会在 ASR 后处理阶段自动应用这些规则。
#
# 用法：
#   1. 添加小写形式的词作为键
#   2. 添加正确格式作为值
#   3. 保存文件后重启程序即可生效

